        startQuiz();

function startQuiz() {
      let questions = originalQuestions.map((q) => ({ ...q })),
    current = 0,
    selected = Array(questions.length).fill(null),
    favorites = [],
    wrongQuestions = [],
    correctCount = 0,
    wrongCount = 0;
      const el = (id) => document.getElementById(id);
      el("totalCount").textContent = questions.length;
      function escapeHtml(s) {
        return String(s).replace(
          /[&<>"']/g,
          (m) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#039;",
            })[m],
        );
      }
      function render() {
        const q = questions[current];
       el("favBtn").textContent =
     favorites.includes(q.orig)
        ? "⭐ Usuń z ulubionych"
        : "☆ Dodaj do ulubionych";
        el("counter").textContent =
          `Pytanie ${current + 1} / ${questions.length}`;
        el("scoreBox").textContent =
          `Wynik: ${correctCount} dobrych, ${wrongCount} złych`;
        el("bar").style.width = `${((current + 1) / questions.length) * 100}%`;
        el("question").innerHTML = q.question
    .replace(/: a\)/g, ":<br><br>a)")
    .replace(/\. b\)/g, ".<br>b)")
    .replace(/\. c\)/g, ".<br>c)")
    .replace(/\. d\)/g, ".<br>d)");
        el("answers").innerHTML = "";
        el("feedback").className = "feedback";
        el("feedback").textContent = "";
        q.answers.forEach((ans, i) => {
          const btn = document.createElement("button");
          btn.className = "answer";
          btn.innerHTML = `<b>${String.fromCharCode(65 + i)}.</b> ${escapeHtml(ans)}`;
          btn.onclick = () => choose(i);
          if (selected[current] !== null) {
            btn.disabled = true;
            if (i === q.correct) btn.classList.add("correct");
            if (i === selected[current] && i !== q.correct)
              btn.classList.add("wrong");
          }
          el("answers").appendChild(btn);
        });
        if (selected[current] !== null)
          showFeedback(selected[current] === q.correct);
        el("prevBtn").disabled = current === 0;
        el("nextBtn").textContent =
          current === questions.length - 1 ? "Koniec" : "Następne";
        updateStats();
      }
      function choose(i) {
        if (selected[current] !== null) return;
        selected[current] = i;
        if (i === questions[current].correct) correctCount++;
        else wrongCount++;
        render();
      }
      function showFeedback(ok) {
        const f = el("feedback");
        f.className = "feedback " + (ok ? "ok" : "bad");
        f.textContent = ok ? "✅ Dobra odpowiedź!" : "❌ Zła odpowiedź!";
      }
      function updateStats() {
        el("good").textContent = correctCount;
        el("bad").textContent = wrongCount;
        const done = correctCount + wrongCount;
        el("percent").textContent = done
          ? Math.round((correctCount / done) * 100) + "%"
          : "0%";
      }
     el("favBtn").onclick = () => {
    if (favorites.includes(questions[current].orig)) {
        favorites = favorites.filter(i => i !== questions[current].orig);
    } else {
        favorites.push(questions[current].orig);
    }

    render();
};

el("showFavBtn").onclick = () => {

    if (favorites.length === 0) {
        alert("Nie masz jeszcze ulubionych pytań.");
        return;
    }
el("showAllBtn").onclick = () => {
    questions = originalQuestions.map(q => ({ ...q }));
    selected = Array(questions.length).fill(null);
    current = 0;
    correctCount = 0;
    wrongCount = 0;
    el("totalCount").textContent = questions.length;
    render();
};
    questions = originalQuestions.filter(q =>
        favorites.includes(q.orig)
    );

    selected = Array(questions.length).fill(null);
    current = 0;
    correctCount = 0;
    wrongCount = 0;

    render();
};
   el("nextBtn").onclick = () => {
    if (current < questions.length - 1) {
        current++;
        render();
    } else {
        alert(`Koniec gry! Wynik: ${correctCount}/${questions.length}`);
    }
};
      el("prevBtn").onclick = () => {
        if (current > 0) {
          current--;
          render();
        }
      };
      el("restartBtn").onclick = () => {
        selected = Array(questions.length).fill(null);
        correctCount = 0;
        wrongCount = 0;
        current = 0;
        render();
      };
      el("shuffleBtn").onclick = () => {
        for (let i = questions.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [questions[i], questions[j]] = [questions[j], questions[i]];
        }
        selected = Array(questions.length).fill(null);
        correctCount = 0;
        wrongCount = 0;
        current = 0;
        render();
      };
      el("gotoBtn").onclick = () => {
    const nr = parseInt(el("gotoQuestion").value);

    if (!isNaN(nr) && nr >= 1 && nr <= questions.length) {
        current = nr - 1;
        render();
    } else {
        alert("Podaj numer od 1 do " + questions.length);
    }
};

el("gotoQuestion").addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        el("gotoBtn").click();
    }
});
      render();
      } 
    </script>
